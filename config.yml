version: 2.1

jobs:
  test:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: pip install pytest
      - run:
          name: Run unit tests
          command: pytest test_part1.py -v

workflows:
  run-tests:
    jobs:
      - test
